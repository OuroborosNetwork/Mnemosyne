# Mnemosyne blue-green upstream. The deploy script REWRITES this file to point at
# whichever container (blue=3005 / green=3006) it just brought up healthy, then
# reloads nginx — that reload is the zero-downtime cut-over.
#
# One-time vhost wiring (in the codex.ancientholdings.eu server file):
#   1. At the TOP of the file (http context, OUTSIDE `server { }`):
#          include /etc/nginx/snippets/mnemosyne-upstream.conf;
#   2. In the `location / { }` that proxies the app, replace the hardcoded
#          proxy_pass http://127.0.0.1:3005;
#      with
#          proxy_pass http://mnemosyne_app;
#
# After that, deploys flip the target here; the vhost never changes again.
upstream mnemosyne_app { server 127.0.0.1:3005; }
