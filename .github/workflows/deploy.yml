name: Deploy Mnemosyne (Next app) to codex.ancientholdings.eu

# Mnemosyne v0.1+ — Next.js app auto-deploy (SUPERSEDES the old static web/ rsync).
#
# The Codex is consumed as the single published npm package `@ancientpantheon/codex`
# (`npm ci` pulls it — no Codex repo checkout needed). Builds the SELF-CONTAINED
# Next `output: "standalone"` bundle, rsyncs it to the VPS, reloads the pm2 process.
# nginx reverse-proxies codex.ancientholdings.eu -> 127.0.0.1:3005 (one-time VPS
# setup: see deploy/RUNBOOK.md). Runtime secrets (OIDC creds, SESSION_SECRET) live
# in the SERVER's /var/www/codex.ancientholdings.eu/.env.local — NOT in CI.
#
# Required GitHub secrets:
#   DEPLOY_SSH_KEY    — private half of the mnemosyne_deploy_ed25519 keypair (VPS root)
#   DEPLOY_HOST       — the VPS IP (85.215.141.198)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Mnemosyne
        uses: actions/checkout@v4
        with:
          path: _Claude/StoaOuronet/Mnemosyne

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Mnemosyne (standalone)
        working-directory: _Claude/StoaOuronet/Mnemosyne
        run: |
          npm ci   # pulls @ancientpantheon/codex + deps from npm
          npm run build   # next build --webpack, output: "standalone"

      - name: Assemble the self-contained bundle
        working-directory: _Claude/StoaOuronet/Mnemosyne
        run: |
          rm -rf deploy-bundle && mkdir -p deploy-bundle/.next
          cp -a .next/standalone/. deploy-bundle/     # server.js + traced node_modules + .next build
          cp -a .next/static deploy-bundle/.next/static
          # NOTE: next standalone already traces public/index.html into
          # .next/standalone/public (because route.ts reads it). So we must REPLACE
          # that partial public/ with the FULL flat public/ — otherwise `cp -a public
          # deploy-bundle/public` nests it under public/public and /assets + /docs 404.
          rm -rf deploy-bundle/public
          cp -a public deploy-bundle/public
          # sanity: self-contained + public is flat (assets/docs at the top level)
          test -f deploy-bundle/server.js || (echo "::error::standalone server.js missing" && exit 1)
          test -d deploy-bundle/public/assets || (echo "::error::public/ not flat — assets missing" && exit 1)
          test -f deploy-bundle/public/docs/index.html || (echo "::error::public/docs missing" && exit 1)

      - name: Prepare deploy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync bundle to the VPS app dir
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        working-directory: _Claude/StoaOuronet/Mnemosyne
        run: |
          # --delete keeps the app dir clean. .env.local + ecosystem.config.js live
          # in the PARENT dir (stable, one-time), so --delete never touches secrets.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no" \
            deploy-bundle/ root@${DEPLOY_HOST}:/var/www/codex.ancientholdings.eu/app/
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes root@${DEPLOY_HOST} \
            "chown -R www-data:www-data /var/www/codex.ancientholdings.eu/app/ || true"

      - name: Reload the pm2 service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          # The pm2 app is registered once by the runbook (deploy/RUNBOOK.md).
          # reload = zero-downtime restart picking up the new bundle.
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes root@${DEPLOY_HOST} \
            "pm2 reload mnemosyne --update-env || pm2 start /var/www/codex.ancientholdings.eu/ecosystem.config.js"

      - name: Smoke test the live app
        run: |
          sleep 3
          ROOT=$(curl -sI https://codex.ancientholdings.eu/ | head -1 | awk '{print $2}')
          ME=$(curl -s https://codex.ancientholdings.eu/api/me)
          echo "/ -> $ROOT ; /api/me -> $ME"
          [ "$ROOT" = "200" ] || (echo "::error::landing not 200" && exit 1)
          curl -s https://codex.ancientholdings.eu/ | grep -q "brand-lambda" \
            || (echo "::error::landing HTML missing brand-lambda" && exit 1)
          echo "$ME" | grep -q "authenticated" \
            || (echo "::error::/api/me not responding — Node app not proxied?" && exit 1)
          echo "Deploy smoke-tests passed ✓"

      - name: Cleanup ephemeral SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
